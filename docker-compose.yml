# ─────────────────────────────────────────────────────────────────
# Ironsight production-shaped stack.
#
# This is the single-host layout — one Docker Engine runs everything.
# For multi-host production (see Documents/MasterDeployment.md) the
# same service definitions translate to Swarm/K8s; the only thing
# that changes is the volume type (named volumes → NFS/S3/PV).
#
# Running locally:
#   cp .env.example .env       # edit secrets
#   docker compose up -d --build
#
# Exposed host ports (edit in .env if they collide):
#   3000  frontend (Next.js)
#   8080  API (Go)
#   8554  mediamtx RTSP (cameras pull here for low-latency live)
#   8889  mediamtx WHEP (browser WebRTC)
#   5432  postgres (omit in prod — DB should not be externally reachable)
#
# Host dependencies: Docker Engine 24+, Compose v2.
# ─────────────────────────────────────────────────────────────────

services:

  db:
    # Fully-qualified image names throughout this file. Podman doesn't
    # default to docker.io — bare names can fail or prompt interactively.
    # Docker ignores the registry prefix when present; Podman requires it.
    image: docker.io/timescale/timescaledb:latest-pg15
    container_name: ironsight-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onvif_tool}
      POSTGRES_USER: ${POSTGRES_USER:-onvif}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Postgres runs files in this dir alphabetically on first boot.
      # init.sql creates the ONVIF base schema; ironsight_platform.sql
      # adds SOC-platform tables (users, sites, operators, incidents,
      # security_events) that the in-code ALTER TABLE migrations in
      # cmd/server/main.go depend on. Both are required — without the
      # second file the migration batch hits "relation operators does
      # not exist" and silently rolls back every subsequent statement.
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./ironsight_platform.sql:/docker-entrypoint-initdb.d/02-platform.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Uncomment for local debugging. In prod, drop this — only the
    # api/worker services need DB access, and compose networking is enough.
    # ports:
    #   - "5432:5432"
    networks: [backplane]

  # Redis — pub/sub bridge for the WebSocket hub when running >1 API replica.
  # Only started when the `scale-out` profile is active:
  #   docker compose --profile scale-out up -d
  # Single-replica deployments don't need Redis; the api service's REDIS_URL
  # below is also commented out by default so the in-memory hub is used.
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: ironsight-redis
    restart: unless-stopped
    profiles: [scale-out]
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    # No persistence: this is pub/sub only. Messages in flight during a
    # Redis restart are lost, and that's fine — WS events are best-effort.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [backplane]

  mediamtx:
    image: docker.io/bluenviron/mediamtx:latest
    container_name: ironsight-mediamtx
    restart: unless-stopped
    # The Go API writes mediamtx_runtime.yml into the shared config volume
    # once, at startup, as bootstrap state. Runtime path adds/removes go
    # through mediamtx's HTTP control API (port 9997, internal to the
    # backplane) — no config-volume round-trip, no restart needed.
    command: ["/mediamtx-config/mediamtx_runtime.yml"]
    volumes:
      - mediamtx-config:/mediamtx-config
    ports:
      - "${MEDIAMTX_RTSP_PORT:-8554}:18554"   # RTSP relay (record engine pulls from this)
      - "${MEDIAMTX_WEBRTC_PORT:-8889}:8889"  # WHEP for browser WebRTC
      # Port 9997 (control API) is intentionally not published to the host.
      # The Go API reaches it over the backplane network at mediamtx:9997.
    networks: [backplane]

  # On-camera-frame YOLO detection service. Called on-demand by the API
  # when an event fires; not in the hot path for recording.
  # `localhost/` prefix tells Podman this is a locally-built image, don't
  # try to pull from a registry. Docker ignores the prefix.
  yolo:
    build:
      context: ./services/yolo
      dockerfile: Dockerfile
    image: ${YOLO_IMAGE:-localhost/ironsight/yolo:latest}
    container_name: ironsight-yolo
    restart: unless-stopped
    environment:
      # server.py reads YOLO_MODEL (not MODEL). Default matches the
      # weights bundled into the image by services/yolo/Dockerfile.
      YOLO_MODEL: ${YOLO_MODEL:-yolo11n.pt}
      PORT: "8501"
      # Pin YOLO to a specific GPU. Detection is latency-sensitive and
      # fires on every alarm — gets its own card so Qwen's batch workload
      # can't starve it.
      #
      # Two-layer model: `devices` grants the container access to every
      # GPU via the nvidia.com/gpu=all CDI spec; CUDA_VISIBLE_DEVICES
      # is then read by the CUDA runtime (libcuda) inside the container
      # to decide which of those GPUs the app actually uses.
      #
      # Why not NVIDIA_VISIBLE_DEVICES + nvidia.com/gpu=0? That pattern
      # works on native Linux but is a no-op under WSL — WSL exposes
      # every GPU through a single virtual /dev/dxg node, so neither
      # per-index CDI names nor NVIDIA_VISIBLE_DEVICES can mask at the
      # device layer. CUDA_VISIBLE_DEVICES filters at the CUDA library
      # level and works identically on both platforms.
      CUDA_VISIBLE_DEVICES: "${YOLO_GPU_INDEX:-0}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    # CDI device access. On first setup run (once, as root):
    #   nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
    devices:
      - nvidia.com/gpu=all
    networks: [backplane]

  # Vision-language model for scene reasoning / semantic search.
  qwen:
    build:
      context: ./services/qwen
      dockerfile: Dockerfile
    image: ${QWEN_IMAGE:-localhost/ironsight/qwen:latest}
    container_name: ironsight-qwen
    restart: unless-stopped
    environment:
      # server.py reads QWEN_MODEL. Default is a ~3B VLM that fits
      # comfortably on a single 8GB card at fp16.
      QWEN_MODEL: ${QWEN_MODEL:-Qwen/Qwen2.5-VL-3B-Instruct}
      PORT: "8502"
      # Pin Qwen to GPU 1 (second 3070). The VLM indexer is the heaviest
      # workload in the stack — segregating it from YOLO keeps detection
      # latency predictable under indexer load. Swap GPU indices if your
      # physical card ordering differs. See yolo service above for the
      # CUDA_VISIBLE_DEVICES vs NVIDIA_VISIBLE_DEVICES rationale on WSL.
      CUDA_VISIBLE_DEVICES: "${QWEN_GPU_INDEX:-1}"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    # See yolo service above for CDI + WSL notes.
    devices:
      - nvidia.com/gpu=all
    volumes:
      # HuggingFace model cache — first run downloads ~5GB of Qwen
      # weights. Persisting this volume means container restarts are
      # ~30s instead of ~5 minutes.
      - hf-cache:/home/ironsight/.cache/huggingface:U
    networks: [backplane]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/ironsight/api:${IRONSIGHT_VERSION:-latest}
    container_name: ironsight-api
    restart: unless-stopped
    # Run as root *inside* the container so the Go process can write to
    # named volumes regardless of their ownership. Under rootless podman
    # (the target deployment mode), container-root still maps to an
    # unprivileged user on the host via user-namespace remapping, so this
    # does not confer any host privilege. On native Docker this relaxes
    # one layer of defense-in-depth; if you need strict non-root there,
    # pre-chown the named volumes with a one-shot init container.
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
      mediamtx:
        condition: service_started
    environment:
      # Server
      SERVER_PORT: "8080"
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-onvif}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-onvif_tool}?sslmode=disable
      # MediaMTX: external mode, reach mediamtx by its service name.
      # The API address is internal-only — the Go API uses it for runtime
      # path adds/removes without needing a config-volume round-trip.
      EMBEDDED_MEDIAMTX: "0"
      MEDIAMTX_WEBRTC_ADDR: mediamtx:8889
      MEDIAMTX_RTSP_ADDR: mediamtx:18554
      MEDIAMTX_API_ADDR: mediamtx:9997
      # AI services via docker DNS
      AI_YOLO_URL: http://yolo:8501
      AI_QWEN_URL: http://qwen:8502
      AI_ENABLED: ${AI_ENABLED:-true}
      # Storage. /data is mounted from the recordings volume; the
      # Dockerfile already sets STORAGE_PATH/HLS_PATH/EXPORT_PATH/THUMBNAIL_PATH
      # to /data/* subdirs.
      SEGMENT_DURATION: ${SEGMENT_DURATION:-60}
      # Secrets — REQUIRED. The fallback defaults in config.Load() are
      # explicitly unsafe; fail hard when the operator forgot to set them.
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (openssl rand -hex 32)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      # Branding — product name used in backend-generated artifacts.
      PRODUCT_NAME: ${PRODUCT_NAME:-Ironsight}
      # Redis pub/sub bridge for multi-replica WS fanout. Leave unset for
      # single-replica deployments (the in-memory hub is sufficient). Set
      # to redis://redis:6379/0 when running the `scale-out` compose profile.
      REDIS_URL: ${REDIS_URL:-}
      REDIS_WS_CHANNEL: ${REDIS_WS_CHANNEL:-ironsight:ws:broadcast}
      # Batch workers (retention, indexer, exports) run in the sibling
      # `worker` service, not inside api. Set to true for a single-binary
      # deployment where the api also owns the background jobs.
      RUN_WORKERS: ${RUN_WORKERS_API:-false}
    volumes:
      # The :U flag is a podman extension: on mount, chown the volume
      # contents to the container user (uid 10001). Without it, rootless
      # podman creates named volumes owned by root in the user namespace,
      # and the non-root api process can't write mediamtx_runtime.yml or
      # its recordings. Docker ignores the suffix (it's a parse error on
      # some Docker versions — if you hit that, drop ":U" and chown the
      # volume manually once after first boot).
      - recordings:/data:U
      - mediamtx-config:/app/bin:U    # Go writes mediamtx_runtime.yml here
    ports:
      - "${API_PORT:-8080}:8080"
    networks: [backplane]

  # Background batch workloads — retention purge, VLM indexer, export
  # concat jobs. Same image as api, just a different entrypoint. Always
  # runs with replicas=1; retention is idempotent but running two indexer
  # workers on the same segments is wasted GPU time, and we don't yet
  # have an atomic claim for indexer jobs like the export worker has.
  worker:
    image: localhost/ironsight/api:${IRONSIGHT_VERSION:-latest}
    container_name: ironsight-worker
    restart: unless-stopped
    # Same rationale as api above — worker writes to the shared /data
    # volume (exports + thumbnails) and needs to own the files it creates.
    user: "0:0"
    # Disable the Dockerfile HEALTHCHECK: it targets the server binary's
    # HTTP port (8080), but this service runs the worker entrypoint which
    # has no HTTP surface. Without this override the worker reports
    # "unhealthy" forever and compose lights up warnings for a healthy
    # container. Liveness for the worker is handled by its restart policy
    # and log output.
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started    # ensures migrations have run
    entrypoint: ["/app/worker"]
    environment:
      # Share the DB/storage/AI plumbing with api. The worker binary
      # ignores RUN_WORKERS — it unconditionally runs its jobs.
      DATABASE_URL: postgres://${POSTGRES_USER:-onvif}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-onvif_tool}?sslmode=disable
      AI_YOLO_URL: http://yolo:8501
      AI_QWEN_URL: http://qwen:8502
      AI_ENABLED: ${AI_ENABLED:-true}
      SEGMENT_DURATION: ${SEGMENT_DURATION:-60}
      PRODUCT_NAME: ${PRODUCT_NAME:-Ironsight}
      # Worker writes export outputs into the same shared volume the api
      # reads from; paths match the api's subdir layout.
      STORAGE_PATH: /data/recordings
      EXPORT_PATH: /data/exports
      THUMBNAIL_PATH: /data/thumbnails
      # Indexer concurrency — tune per GPU. 1 is safe for a test rig;
      # production A40s can sustain 4-8.
      INDEXER_CONCURRENCY: ${INDEXER_CONCURRENCY:-1}
    volumes:
      - recordings:/data:U
    networks: [backplane]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into Next.js routes-manifest at build time — see
        # frontend/next.config.js + frontend/Dockerfile for details.
        # Must match the compose service name of the api container.
        API_INTERNAL_URL: http://api:8080
    image: localhost/ironsight/frontend:${IRONSIGHT_VERSION:-latest}
    container_name: ironsight-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # The browser talks to the API via whatever public URL your reverse
      # proxy exposes. In single-host dev we just proxy same-origin.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-/api}
      # Server-side rewrite target for Next.js. The browser calls paths
      # like /api/... or /auth/... on the frontend origin; next.config.js
      # rewrites them to this URL internally. Use the compose service
      # name so the request stays on the backplane network.
      API_INTERNAL_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks: [backplane]

volumes:
  pgdata:
    # DB data — back this up off-box. See MasterDeployment.md §Backup.
  recordings:
    # Video segments, HLS, thumbnails, exports. In production replace
    # with a driver-backed volume (NFS, CSI) so multiple API replicas
    # and/or a split-out recorder container can share storage.
  mediamtx-config:
    # Runtime YAML written by api, read by mediamtx.
  hf-cache:
    # Qwen VLM weights downloaded from HuggingFace on first run.
    # Safe to delete if you want to force a re-download.

networks:
  backplane:
    driver: bridge
    # Internal DNS resolves service names; no published ports between
    # services. Only api/frontend/mediamtx expose host ports above.
